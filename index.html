/* ════════════════════════════════════════════
   LEAFLET MAP
════════════════════════════════════════════ */
const LeafletMap = ({ highlightId=null, height='380px', mapKey }) => {
  const divRef = useRef(null);
  const mapRef = useRef(null);

  useEffect(() => {
    if (!divRef.current) return;
    const map = L.map(divRef.current, { zoomControl: true, attributionControl: false })
      .setView([-9.640, -35.737], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    mapRef.current = map;

    LINES.forEach(ln => {
      const isHL = highlightId ? ln.id === highlightId : true;
      const routeColor = isHL ? '#FFDD00' : '#444444';
      L.polyline(ln.route, {
        color: routeColor,
        weight: highlightId ? (isHL ? 5 : 1.5) : 2.5,
        opacity: highlightId ? (isHL ? 1 : 0.3) : 0.7,
      }).addTo(map);
      if (!highlightId || isHL) {
        const r = ln.route;
        L.circleMarker(r[0], { radius:5, color:routeColor, fillColor:'#141414', fillOpacity:1, weight:2 }).addTo(map);
        L.circleMarker(r[r.length-1], { radius:5, color:routeColor, fillColor:routeColor, fillOpacity:1, weight:2 }).addTo(map);
      }
    });

    return () => { map.remove(); mapRef.current = null; };
  }, [mapKey, highlightId]);

  return <div ref={divRef} style={{ height, width:'100%', borderRadius:4, zIndex:0 }}/>;
};

/* ════════════════════════════════════════════
   OPT MAP — rota original vs proposta
════════════════════════════════════════════ */
const OptMap = ({ lineId, height='240px' }) => {
  const divRef = useRef(null);
  const orig = LINES.find(l => l.id === lineId);
  const newRoutes = OPT_ROUTES[lineId];

  useEffect(() => {
    if (!divRef.current) return;
    const center = orig.route[Math.floor(orig.route.length / 2)];
    const map = L.map(divRef.current, { zoomControl:false, attributionControl:false })
      .setView(center, 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    L.polyline(orig.route, { color:'#888', weight:2.5, opacity:0.5, dashArray:'8,6' }).addTo(map);

    newRoutes.forEach(seg => {
      L.polyline(seg.route, { color:seg.color, weight:4.5, opacity:0.92 }).addTo(map);
      const r = seg.route;
      L.circleMarker(r[0], { radius:5, color:seg.color, fillColor:'#1a1a1a', fillOpacity:1, weight:2 }).addTo(map);
      L.circleMarker(r[r.length-1], { radius:5, color:seg.color, fillColor:seg.color, fillOpacity:1, weight:2 }).addTo(map);
    });

    return () => { map.remove(); };
  }, [lineId]);

  return <div ref={divRef} style={{ height, width:'100%', borderRadius:4, zIndex:0 }}/>;
};

/* ════════════════════════════════════════════
   SVG BAR CHART
════════════════════════════════════════════ */
const BarChart = ({ data, h=100 }) => {
  const max = Math.max(...data.map(d=>d.d));
  const W = 500, bw = Math.floor(W/data.length)-2;
  return (
    <svg viewBox={`0 0 ${W} ${h+22}`} width="100%" preserveAspectRatio="none">
      {data.map((d,i) => {
        const bh = Math.round((d.d/max)*h);
        const x = i*(W/data.length)+1;
        const col = d.d>80?'#FFDD00':'#333333';
        return (
          <g key={d.h}>
            <rect x={x} y={h-bh} width={bw} height={bh} fill={col} rx="2" opacity="0.83"/>
            <text x={x+bw/2} y={h+15} textAnchor="middle" fontSize="8.5" fill="#A6A6A6">{d.h}h</text>
          </g>
        );
      })}
    </svg>
  );
};

/* ════════════════════════════════════════════
   AREA CHART
════════════════════════════════════════════ */
const AreaChart = ({ data }) => {
  const days = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const W = 560, H = 165;
  const pad = { l:38, r:16, t:8, b:26 };
  const iW = W - pad.l - pad.r, iH = H - pad.t - pad.b;
  const n = days.length;
  const maxV = Math.max(...data.manha, ...data.tarde, ...data.noite) * 1.12;

  const xP = i => pad.l + (i / (n-1)) * iW;
  const yP = v => pad.t + iH * (1 - v / maxV);

  const smoothLine = vals => {
    const pts = vals.map((v,i) => ({ x:xP(i), y:yP(v) }));
    let d = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for (let i=1; i<pts.length; i++) {
      const cp = ((pts[i-1].x + pts[i].x) / 2).toFixed(1);
      d += ` C ${cp} ${pts[i-1].y.toFixed(1)}, ${cp} ${pts[i].y.toFixed(1)}, ${pts[i].x.toFixed(1)} ${pts[i].y.toFixed(1)}`;
    }
    return d;
  };

  const areaPath = vals => {
    const bY = (pad.t + iH).toFixed(1);
    return `${smoothLine(vals)} L${xP(n-1).toFixed(1)} ${bY} L${xP(0).toFixed(1)} ${bY} Z`;
  };

  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => ({
    lbl: Math.round(maxV * f / 1000) + 'k',
    y: yP(maxV * f),
  }));

  const series = [
    { vals:data.noite, fill:'#2E5022', stroke:'#3E6A2E' },
    { vals:data.tarde, fill:'#4A7A3A', stroke:'#5A9048' },
    { vals:data.manha, fill:'#8A7200', stroke:'#FFDD00' },
  ];

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{overflow:'visible',display:'block'}}>
      {yTicks.map(({lbl,y},i) => (
        <g key={i}>
          <line x1={pad.l} y1={y} x2={pad.l+iW} y2={y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3,3"/>
          <text x={pad.l-5} y={y+3} textAnchor="end" fontSize="8" fill="var(--muted)">{lbl}</text>
        </g>
      ))}
      {series.map((s,i) => <path key={i} d={areaPath(s.vals)} fill={s.fill} opacity="0.65"/>)}
      {series.map((s,i) => <path key={i+'-l'} d={smoothLine(s.vals)} fill="none" stroke={s.stroke} strokeWidth="1.8" opacity="0.95"/>)}
      {days.map((d,i) => (
        <text key={d} x={xP(i)} y={H-4} textAnchor="middle" fontSize="8.5" fill="var(--muted)">{d}</text>
      ))}
    </svg>
  );
};

/* ════════════════════════════════════════════
   DONUT CHART
════════════════════════════════════════════ */
const Donut = ({ items }) => {
  const total = items.reduce((s,i)=>s+i.v,0);
  let angle = -90;
  const r=50, cx=65, cy=65;
  const slices = items.map(it => {
    const a = (it.v/total)*360;
    const s = (angle*Math.PI)/180, e = ((angle+a)*Math.PI)/180;
    const x1=cx+r*Math.cos(s), y1=cy+r*Math.sin(s), x2=cx+r*Math.cos(e), y2=cy+r*Math.sin(e);
    const p = `M${cx} ${cy} L${x1} ${y1} A${r} ${r} 0 ${a>180?1:0} 1 ${x2} ${y2} Z`;
    angle += a;
    return { ...it, p };
  });
  return (
    <div style={{display:'flex',alignItems:'center',gap:18}}>
      <svg viewBox="0 0 130 130" width="110" height="110" style={{flexShrink:0}}>
        {slices.map((s,i)=><path key={i} d={s.p} fill={s.col} opacity="0.88"/>)}
        <circle cx={cx} cy={cy} r="30" style={{fill:"var(--card)"}}/>
        <text x={cx} y={cy-3} textAnchor="middle" fontSize="12" fontWeight="700" style={{fill:"var(--text)"}}>{total}</text>
        <text x={cx} y={cy+12} textAnchor="middle" fontSize="7.5" style={{fill:"var(--muted)"}}>total</text>
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:7,fontSize:11}}>
            <span style={{width:9,height:9,borderRadius:2,background:s.col,flexShrink:0}}/>
            <span style={{color:'var(--muted)'}}>{s.lbl}</span>
            <span style={{fontFamily:'IBM Plex Mono',fontWeight:600,marginLeft:'auto',paddingLeft:8}}>{s.v}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

          </select>
        </div>
      </div>
      <div className="content">

        {/* KPIs */}
        <div className="kpi-grid mb14">
          {[
            {lbl:'Total Semanal', val:fmtBig(totalSemanal), delta:'passageiros', cls:'c-nt'},
            {lbl:'Pico Diário', val:fmtBig(picoDiario), delta:'máx. passageiros/dia', cls:'c-nt'},
            {lbl:'Eficiência de Rota', val:`${sel.eff}%`, delta:sel.eff<70?'Requer atenção':sel.eff>85?'Operação saudável':'Moderada', cls:sel.eff<70?'c-dn':sel.eff>85?'c-up':'c-nt'},
            {lbl:'Atraso Médio', val:`${sel.delay} min`, delta:sel.delay>5?'Acima do limite':sel.delay<3?'Dentro do ideal':'Aceitável', cls:sel.delay>5?'c-dn':sel.delay<3?'c-up':'c-nt'},
          ].map((k,i)=>(
            <div key={i} className="kpi">
              <div className="kpi-lbl">{k.lbl}</div>
              <div className="kpi-val">{k.val}</div>
              <div className={`kpi-delta ${k.cls}`}>{k.delta}</div>
            </div>
          ))}
        </div>

        {/* Fluxo Semanal por Turno */}
        <div className="card mb14">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div className="card-title" style={{marginBottom:0}}>Fluxo Semanal por Turno</div>
            <div style={{display:'flex',gap:4}}>
              {['semana','mês','trimestre'].map(p=>(
                <button key={p} className={`period-btn${period===p?' active':''}`} onClick={()=>setPeriod(p)}>
                  {p.charAt(0).toUpperCase()+p.slice(1)}
                </button>
              ))}
            </div>
          </div>
          <AreaChart data={flow}/>
          <div style={{display:'flex',gap:18,marginTop:10,fontSize:11,color:'var(--muted)'}}>
            <span style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:22,height:2,background:'#FFDD00',display:'inline-block',borderRadius:2}}/> Manhã</span>
            <span style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:22,height:2,background:'#5A9048',display:'inline-block',borderRadius:2}}/> Tarde</span>
            <span style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:22,height:2,background:'#3E6A2E',display:'inline-block',borderRadius:2}}/> Noite</span>
          </div>
        </div>

        {/* Mapa + Indicadores de Uso */}
        <div className="g2 mb14" style={{gridTemplateColumns:'1.45fr 1fr'}}>
          <div className="card">
            <div className="card-title">Traçado da Rota</div>
            <LeafletMap highlightId={sel.id} height="340px" mapKey={`linha-${sel.id}`}/>
          </div>
          <div className="card">
            <div className="card-title">Indicadores de Uso</div>
            <div className="mrow"><span className="mk">Tempo médio de viagem</span><span className="mv">{stats.tempoMedio} min</span></div>
            <div className="mrow"><span className="mk">Intervalo médio entre ônibus</span><span className="mv">{stats.intervalo} min</span></div>
            <div className="mrow"><span className="mk">Taxa de pontualidade</span><span className="mv">{stats.pontualidade}%</span></div>
            <div className="mrow"><span className="mk">Cartões RFID ativos</span><span className="mv">{fmtBig(stats.rfid)}</span></div>
            <div className="mrow"><span className="mk">Recargas registradas hoje</span><span className="mv">{fmtBig(stats.recargas)}</span></div>
            <div className="mrow"><span className="mk">Viagens realizadas hoje</span><span className="mv">{stats.viagens}</span></div>
            <div style={{marginTop:16}}>
              <div className="prow"><span style={{fontSize:12}}>Ocupação atual</span><span className="mono" style={{fontSize:11}}>{sel.occ}%</span></div>
              <div className="pbar" style={{height:8}}><div className="pfill" style={{width:`${sel.occ}%`,background:'#FFDD00'}}/></div>
            </div>
            <div style={{marginTop:10}}>
              <div className="prow"><span style={{fontSize:12}}>Eficiência de rota</span><span className="mono" style={{fontSize:11}}>{sel.eff}%</span></div>
              <div className="pbar" style={{height:8}}><div className="pfill" style={{width:`${sel.eff}%`,background:'#FFDD00'}}/></div>
            </div>
          </div>
        </div>

        {/* Lotação por Hora */}
        <div className="card mb14">
          <div className="card-title">Lotação por Hora — {sel.id}</div>
          <BarChart data={hData} h={85}/>
          <div style={{display:'flex',gap:14,marginTop:6,fontSize:10,color:'var(--muted)'}}>
            <span>■ <span style={{color:'#FFDD00'}}>Pico (&gt;80%)</span></span>
            <span>■ <span style={{color:'#6B6B6B'}}>Normal</span></span>
          </div>
        </div>

        {/* Otimização */}
        <div className="card" style={{borderLeft:'4px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>Otimização de Rota — Algoritmo I</div>
              <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.55}}>Analisa dados históricos dos últimos 30 dias e sugere reestruturação do trajeto: divisão, fusão com outras linhas ou eliminação de trechos redundantes.</div>
            </div>
            {!done
              ? <button className="btn btn-primary" style={{flexShrink:0}} onClick={()=>setModal(true)}>Executar Otimização</button>
              : <span className="badge bg" style={{flexShrink:0}}>✓ Análise concluída</span>
            }
          </div>
          {done && (
            <div style={{marginTop:16,padding:14,background:'var(--sub-card)',border:'1px solid var(--border)',borderRadius:4}}>
              <div style={{fontSize:12,fontWeight:600,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.5px',color:'var(--muted)'}}>{sug.tipo}</div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>{sug.titulo}</div>
              <div style={{fontSize:12,color:'var(--text)',lineHeight:1.65,marginBottom:8}}>{sug.desc}</div>
              <div className="mono" style={{fontSize:11,color:'var(--muted)',marginBottom:16}}>{sug.impacto}</div>
              <div style={{fontSize:10,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:8}}>Nova rota proposta</div>
              <OptMap lineId={sel.id} height="230px"/>
              <div style={{display:'flex',gap:16,marginTop:9,marginBottom:14,fontSize:10,color:'var(--muted)',flexWrap:'wrap'}}>
                <span style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:20,borderTop:'2px dashed #888',display:'inline-block'}}/>

                </span>
                {OPT_ROUTES[sel.id].map((seg,i)=>(
                  <span key={i} style={{display:'flex',alignItems:'center',gap:5}}>
                    <span style={{width:20,height:2,background:seg.color,display:'inline-block',borderRadius:2}}/>
                    {seg.label}
                  </span>
                ))}
              </div>
              <div style={{display:'flex',gap:9}}>
                <button className="btn btn-primary" style={{fontSize:11,padding:'5px 13px'}}>Aplicar sugestão</button>
                <button className="btn btn-secondary" style={{fontSize:11,padding:'5px 13px'}} onClick={()=>setDone(false)}>Descartar</button>
              </div>
            </div>
          )}
        </div>
      </div>

      {modal && (
        <div className="overlay" onClick={()=>setModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Executar Otimização — {sel.id}</div>
            <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6,marginBottom:14}}>
              O algoritmo irá analisar dados de lotação, tempo de percurso, sobreposição com outras linhas e frequência para gerar sugestões de ajuste de trajeto.
            </div>
            <div style={{background:'#EFF6FF',border:'1px solid #BAE6FD',borderRadius:4,padding:12,fontSize:12,color:'#0369A1'}}>
              Linha: <strong>{sel.id} — {sel.name}</strong><br/>
              Eficiência atual: <strong>{sel.eff}%</strong> · Ocupação: <strong>{sel.occ}%</strong> · Atraso médio: <strong>{sel.delay} min</strong>
            </div>
            <div className="modal-foot">
              <button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={()=>{setDone(true);setModal(false);}}>Executar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════════
   ALOCAÇÃO DE FROTA
════════════════════════════════════════════ */
const Frota = () => {
  const [refreshed, setRefreshed]=useState(false);

  const FLEET_REC = { L001:10, L002:6, L003:13, L004:9, L005:3 };
  const totalBuses = LINES.reduce((s,l)=>s+l.buses,0);
  const emOp=36, emMan=2, foraOp=1;
  const dispPct = Math.round(emOp/totalBuses*100);

  const sorted = [...LINES].sort((a,b)=>b.occ-a.occ);
  const alta  = sorted.filter(l=>l.occ>70);
  const baixa = sorted.filter(l=>l.occ<=70);

  const tableRows = [...LINES]
    .sort((a,b)=>b.occ-a.occ)
    .map(l=>({...l, rec:FLEET_REC[l.id], adj:FLEET_REC[l.id]-l.buses}));

  return (
    <div>
      <div className="topbar">
        <span className="topbar-title">Alocação de Frota</span>
        <button className="btn btn-secondary" style={{fontSize:11,padding:'5px 11px'}} onClick={()=>setRefreshed(true)}>
          {Ic({n:'ref',s:12})} Atualizar
        </button>
      </div>
      <div className="content">
        {refreshed && (
          <div style={{marginBottom:12,padding:'7px 13px',background:'var(--sub-card)',border:'1px solid var(--border)',borderRadius:4,fontSize:12,color:'var(--text)'}}>
            ✓ Dados atualizados
          </div>
        )}

        {/* KPIs */}
        <div className="kpi-grid mb14">
          <div className="kpi">
            <div className="kpi-lbl">Frota Total</div>
            <div className="kpi-val">{totalBuses}</div>
            <div className="kpi-delta c-nt">Ônibus cadastrados</div>
          </div>
          <div className="kpi" style={{borderLeft:'3px solid var(--blue)'}}>
            <div className="kpi-lbl">Em Operação</div>
            <div className="kpi-val" style={{color:'var(--blue)'}}>{emOp}</div>
            <div className="kpi-delta c-up">{dispPct}% disponibilidade</div>
          </div>
          <div className="kpi">
            <div className="kpi-lbl">Em Manutenção</div>
            <div className="kpi-val">{emMan}</div>
            <div className="kpi-delta c-nt">Programada</div>
          </div>
          <div className="kpi">
            <div className="kpi-lbl">Fora de Operação</div>
            <div className="kpi-val">{foraOp}</div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
              <span style={{fontSize:11,color:'var(--muted)'}}>Aguardando reparo</span>
              <span className="badge br" style={{fontSize:9,padding:'1px 5px'}}>Atenção</span>
            </div>
          </div>
        </div>

        {/* Maior / Menor demanda */}
        <div className="g2 mb14">
          <div className="card">
            <div className="card-title">Linhas com maior demanda</div>
            {alta.map((l,i)=>(
              <div key={l.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderBottom:i<alta.length-1?'1px solid var(--border)':'none'}}>
                <span className="badge bb" style={{minWidth:46,justifyContent:'center',fontFamily:'IBM Plex Mono',fontSize:10,fontWeight:700}}>{l.id}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,color:'var(--text)',marginBottom:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{l.name}</div>
                  <div style={{fontSize:10,color:'var(--muted)',marginBottom:5}}>Frota atual: {l.buses} · Recomendado: {FLEET_REC[l.id]}</div>
                  <div className="pbar" style={{height:4}}><div className="pfill" style={{width:`${l.occ}%`,background:'#FFDD00'}}/></div>
                </div>
                <div style={{fontSize:20,fontWeight:700,fontFamily:'IBM Plex Mono',color:'var(--text)',flexShrink:0}}>{l.occ}%</div>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="card-title">Linhas com menor demanda</div>
            {baixa.map((l,i)=>(
              <div key={l.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderBottom:i<baixa.length-1?'1px solid var(--border)':'none'}}>
                <span style={{background:'var(--hover-bg)',color:'var(--muted)',border:'1px solid var(--border)',borderRadius:3,padding:'2px 7px',fontSize:10,fontWeight:700,fontFamily:'IBM Plex Mono',flexShrink:0,minWidth:46,textAlign:'center'}}>{l.id}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,color:'var(--text)',marginBottom:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{l.name}</div>
                  <div style={{fontSize:10,color:'var(--muted)',marginBottom:5}}>Frota atual: {l.buses} · Recomendado: {FLEET_REC[l.id]}</div>
                  <div className="pbar" style={{height:4}}><div className="pfill" style={{width:`${l.occ}%`,background:'var(--muted)'}}/></div>
                </div>
                <div style={{fontSize:20,fontWeight:700,fontFamily:'IBM Plex Mono',color:'var(--muted)',flexShrink:0}}>{l.occ}%</div>
              </div>
            ))}
          </div>
        </div>

        {/* Mapa */}
        <div className="card mb14">
          <div className="card-title">Mapa — distribuição geográfica das linhas</div>
          <LeafletMap height="340px" mapKey="frota-map"/>
        </div>

        {/* Plano de Alocação Sugerido */}
        <div className="card">
          <div className="card-title">Plano de Alocação Sugerido</div>
          <table className="tbl">
            <thead>
              <tr>
                <th>Linha</th><th>Trajeto</th><th>Demanda</th>
                <th>Frota Atual</th><th>Frota Recomendada</th>
                <th>Ajuste</th><th>Tendência</th>
              </tr>
            </thead>
            <tbody>
              {tableRows.map(l=>(
                <tr key={l.id}>
                  <td><span className="badge bb">{l.id}</span></td>
                  <td style={{fontSize:12}}>{l.name}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:7}}>
                      <div className="eff"><div className="eff-f" style={{width:`${l.occ}%`,background:'#FFDD00'}}/></div>
                      <span className="mono" style={{fontSize:11}}>{l.occ}%</span>
                    </div>
                  </td>
                  <td className="mono" style={{fontSize:12}}>{l.buses}</td>
                  <td className="mono" style={{fontSize:12}}>{l.rec}</td>
                  <td className="mono" style={{fontSize:13,fontWeight:700,color:l.adj>0?'var(--green)':l.adj<0?'var(--red)':'var(--muted)'}}>
                    {l.adj>0?`+${l.adj}`:l.adj===0?'0':l.adj}
                  </td>
                  <td style={{fontSize:15,color:l.adj>0?'var(--green)':l.adj<0?'var(--red)':'var(--muted)'}}>
                    {l.adj>0?'↑':l.adj<0?'↓':'—'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════
   SEGURANÇA
════════════════════════════════════════════ */
const Seguranca = () => {
  const [incs, setIncs]=useState(INCIDENTS);
  const [pol, setPol]=useState(null);
  const [tab, setTab]=useState('todos');

  const handle = (id, act) => { if(act==='pol'){setPol(id);return;} setIncs(p=>p.map(i=>i.id===id?{...i,st:act}:i)); };
  const confirmPol = () => { setIncs(p=>p.map(i=>i.id===pol?{...i,st:'pol'}:i)); setPol(null); };

  const TABS = [
    {id:'todos',      lbl:'Todos'},
    {id:'crime',      lbl:'Crimes'},
    {id:'ocorrencia', lbl:'Ocorrências'},
    {id:'operacional',lbl:'Operacional'},
  ];

  const catCount = id => incs.filter(i=>i.st==='pending'&&(id==='todos'||i.cat===id)).length;
  const shown  = tab==='todos' ? incs : incs.filter(i=>i.cat===tab);
  const active = shown.filter(i=>i.st==='pending');
  const done   = shown.filter(i=>i.st!=='pending');
  const totalPending = incs.filter(i=>i.st==='pending').length;

  const SC = {Alta:'var(--blue)',Média:'var(--border)',Baixa:'var(--border)'};
  const SB = {Alta:'bb',Média:'bm',Baixa:'bm'};
  const stLbl = {pol:'→ Polícia acionada',arch:'Arquivado',ign:'Ignorado'};

  return (
    <div>
      <div className="topbar">
        <span className="topbar-title">Segurança — Ocorrências</span>
        <span className="badge br">{totalPending} pendente{totalPending!==1?'s':''}</span>
      </div>

      {/* Abas */}
      <div className="sec-tabs">
        {TABS.map(t => {
          const cnt = catCount(t.id);
          return (
            <div key={t.id} className={`sec-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
              {t.lbl}
              {cnt>0 && <span className="sec-tab-count">({cnt})</span>}
            </div>
          );
        })}
      </div>

      <div className="content">
        {active.length>0 && (
          <div className="mb18">
            <div className="stitle">Pendentes</div>
            {active.map(inc=>(
              <div key={inc.id} className="inc-card" style={{borderLeft:`3px solid ${SC[inc.sev]}`}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span className={`badge ${SB[inc.sev]}`}>{inc.sev}</span>
                  <span style={{fontSize:13,fontWeight:600}}>{inc.type}</span>
                  <span className="mono" style={{fontSize:11,color:'var(--muted)',marginLeft:'auto'}}>{inc.time} · {inc.line}</span>
                </div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:5}}>{inc.loc}</div>
                <div style={{fontSize:13,color:'var(--text)',marginBottom:10,lineHeight:1.5}}>{inc.desc}</div>
                <div style={{display:'flex',gap:7}}>
                  <button className="btn btn-danger" style={{fontSize:11,padding:'5px 12px'}} onClick={()=>handle(inc.id,'pol')}>Acionar Polícia</button>
                  <button className="btn btn-secondary" style={{fontSize:11,padding:'5px 12px'}} onClick={()=>handle(inc.id,'arch')}>Arquivar</button>
                  <button className="btn btn-secondary" style={{fontSize:11,padding:'5px 12px'}} onClick={()=>handle(inc.id,'ign')}>Ignorar</button>
                </div>
              </div>
            ))}
          </div>
        )}
        {done.length>0 && (
          <div>
            <div className="stitle" style={{color:'var(--muted)'}}>Resolvidas</div>
            {done.map(inc=>(
              <div key={inc.id} className="inc-card" style={{opacity:0.55}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span className={`badge ${SB[inc.sev]}`}>{inc.sev}</span>
                  <span style={{fontSize:13,fontWeight:600}}>{inc.type}</span>
                  <span className="mono" style={{fontSize:11,color:'var(--muted)'}}>{inc.time} · {inc.line}</span>
                  <span style={{fontSize:11,color:'var(--muted)',marginLeft:'auto',fontStyle:'italic'}}>{stLbl[inc.st]}</span>
                </div>
              </div>
            ))}
          </div>
        )}
        {!active.length && !done.length && (
          <div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)',fontSize:13}}>
            Nenhuma ocorrência registrada nesta categoria.
          </div>
        )}
      </div>

      {pol && (
        <div className="overlay" onClick={()=>setPol(null)}>
          <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title" style={{color:'#CC3333'}}>⚠ Acionar Polícia Militar</div>
            <div style={{fontSize:12,color:'var(--text)',lineHeight:1.6,marginBottom:14}}>Confirma o acionamento da PM para a seguinte ocorrência?</div>
            <div style={{padding:12,background:'rgba(204,51,51,0.08)',border:'1px solid rgba(204,51,51,0.2)',borderRadius:4,fontSize:12,lineHeight:1.5}}>
              <strong>{incs.find(i=>i.id===pol)?.type}</strong> — {incs.find(i=>i.id===pol)?.loc}<br/>
              <span style={{color:'var(--muted)'}}>{incs.find(i=>i.id===pol)?.desc}</span>
            </div>
            <div className="modal-foot">
              <button className="btn btn-secondary" onClick={()=>setPol(null)}>Cancelar</button>
              <button className="btn btn-danger" onClick={confirmPol}>Confirmar Acionamento</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════════
   CHAT
════════════════════════════════════════════ */
const Chat = () => {
  const [msgs, setMsgs]=useState([
    {from:'bot',text:'Olá! Sou o assistente do OptBus. Posso te ajudar a entender as funcionalidades do sistema e resolver dúvidas operacionais. Como posso ajudar?'}
  ]);
  const [inp, setInp]=useState('');
  const botRef = useRef(null);
  const suggs = ['Como filtrar por linha?','Como executar otimização?','Como alocar a frota?','Como tratar uma ocorrência?'];

  const send = () => {
    if(!inp.trim()) return;
    const um = {from:'user',text:inp};
    const bm = {from:'bot',text:getReply(inp)};
    setMsgs(p=>[...p,um,bm]);
    setInp('');
  };

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  return (
    <div className="chat-wrap">
      <div className="topbar">
        <span className="topbar-title">Assistente OptBus</span>
        <span style={{fontSize:11,color:'var(--blue)'}}>● Online</span>
      </div>
      <div className="chat-msgs">
        {msgs.map((m,i)=>(
          <div key={i} className={`bubble ${m.from}`}>{m.text}</div>
        ))}
        <div ref={botRef}/>
      </div>
      {msgs.length===1 && (
        <div style={{padding:'0 26px 10px',display:'flex',gap:7,flexWrap:'wrap'}}>
          {suggs.map(s=>(
            <button key={s} className="btn btn-secondary" style={{fontSize:11,padding:'4px 11px'}} onClick={()=>setInp(s)}>
              {s}
            </button>
          ))}
        </div>
      )}
      <div className="chat-bar">
        <input className="chat-inp" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Digite sua dúvida sobre o sistema…"/>
        <button className="btn btn-primary" onClick={send}>{Ic({n:'send',s:13,c:'#fff'})}</button>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════
   FAQ
════════════════════════════════════════════ */
const Faq = () => {
  const [open, setOpen]=useState(null);
  const [search, setSearch]=useState('');

  const q = search.toLowerCase();
  const filtered = FAQ_GROUPS.map(g=>({
    ...g,
    items: q ? g.items.filter(i=>i.q.toLowerCase().includes(q)||i.a.toLowerCase().includes(q)) : g.items,
  })).filter(g=>g.items.length>0);

  const SearchIc = () => (
    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" strokeWidth="1.3"/>
      <path d="M10.5 10.5L14 14" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );

  return (
    <div>
      <div className="topbar"><span className="topbar-title">Perguntas Frequentes</span></div>
      <div className="content" style={{maxWidth:760}}>

        {/* Barra de pesquisa */}
        <div style={{position:'relative',marginBottom:24}}>
          <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',color:'var(--muted)',display:'flex'}}>
            <SearchIc/>
          </span>
          <input
            className="inp"
            style={{paddingLeft:38,fontSize:13}}
            placeholder="Buscar na central de ajuda…"
            value={search}
            onChange={e=>{setSearch(e.target.value);setOpen(null);}}
          />
          {search && (
            <span
              style={{position:'absolute',right:13,top:'50%',transform:'translateY(-50%)',cursor:'pointer',color:'var(--muted)',fontSize:16,lineHeight:1}}
              onClick={()=>setSearch('')}
            >×</span>
          )}
        </div>

        {/* Grupos de tópicos */}
        {filtered.length===0 ? (
          <div style={{textAlign:'center',padding:'48px 0',color:'var(--muted)',fontSize:13}}>
            Nenhuma pergunta encontrada para "{search}".
          </div>
        ) : filtered.map(g=>(
          <div key={g.id} className="card mb14">
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'1.3px',textTransform:'uppercase',color:'var(--muted)',paddingBottom:10,borderBottom:'1px solid var(--border)',marginBottom:2}}>
              {g.topic}
            </div>
            {g.items.map((f,i)=>(
              <div key={f.id} style={{borderTop:i===0?'none':'1px solid var(--border)'}}>
                <div
                  className="faq-q"
                  style={{color:open===f.id?'var(--blue)':'var(--text)',paddingLeft:0,paddingRight:0}}
                  onClick={()=>setOpen(open===f.id?null:f.id)}
                >
                  <span>{f.q}</span>
                  {Ic({n:open===f.id?'chvu':'chv',s:13,c:open===f.id?'var(--blue)':'#9CA3AF'})}
                </div>
                {open===f.id && (
                  <div className="faq-a" style={{paddingLeft:0,paddingRight:0}}>{f.a}</div>
                )}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════
   SESSION MODAL
════════════════════════════════════════════ */
const SessionModal = ({ onOk, onNo }) => (
  <div className="overlay" onClick={onNo}>
    <div className="modal" style={{maxWidth:340}} onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Encerrar Sessão</div>
      <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6}}>Deseja encerrar a sessão atual? Você será redirecionado para a tela de login.</div>
      <div className="modal-foot">
        <button className="btn btn-secondary" onClick={onNo}>Não</button>
        <button className="btn btn-primary" onClick={onOk}>Sim, encerrar</button>
      </div>
    </div>
  </div>
);

// helper for CSS var in JSX
const var_ = n => `var(${n})`;

/* ════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════ */
const App = () => {
  const [screen, setScreen]=useState('login');
  const [sessModal, setSessModal]=useState(false);
  const [isDark, setIsDark]=useState(true);
  const [sidebarCollapsed, setSidebarCollapsed]=useState(false);

  useEffect(()=>{
    if(isDark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  },[isDark]);

  const SCREENS = {
    dash:  <Dashboard/>,
    linha: <Linha/>,
    frota: <Frota/>,
    sec:   <Seguranca/>,
    chat:  <Chat/>,
    faq:   <Faq/>,
  };

  // Theme toggle button — visible in all screens
  const ThemeBtn = () => (
    <button className="theme-btn" onClick={()=>setIsDark(d=>!d)} title={isDark?'Modo claro':'Modo escuro'}>
      {isDark
        ? <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.5" stroke="currentColor" strokeWidth="1.3"/><path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M11.9 3.4l-.7.7M3.4 11.9l.7-.7" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
        : <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13.5 10A6 6 0 016 2.5a6 6 0 000 11A6 6 0 0013.5 10z" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
      }
      {isDark ? 'Modo claro' : 'Modo escuro'}
    </button>
  );

  if(screen==='login') return (
    <>
      <Login onLogin={()=>setScreen('dash')}/>
      <ThemeBtn/>
    </>
  );

  return (
    <>
      <div className="app">
        <Sidebar cur={screen} nav={setScreen} logout={()=>setSessModal(true)} collapsed={sidebarCollapsed} onToggle={()=>setSidebarCollapsed(d=>!d)}/>
        <div className="main">{SCREENS[screen]}</div>
        {sessModal && <SessionModal onOk={()=>{setSessModal(false);setScreen('login');}} onNo={()=>setSessModal(false)}/>}
      </div>
      <ThemeBtn/>
      {screen !== 'chat' && (
        <button className="fab-chat" onClick={()=>setScreen('chat')} title="Abrir assistente">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 4a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H8l-4 4V4z" stroke="#000" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M8 9h8M8 13h5" stroke="#000" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </button>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
